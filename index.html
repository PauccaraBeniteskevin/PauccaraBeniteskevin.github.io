<html>
    <head>
        <title></title>
        <style>
            *{
                margin: 0px;
                padding: 0px;
            }
            .contenedor{
                width: 400px;
                height: 200px;
                border: 1px solid black;
                position: relative;
                margin: 0 auto;
                overflow: hidden;
                background-image: url(img/campo.jpg);
            }
            .cuadrito{
                width: 50px;
                height: 50px;
                top: 50px;
                background-color: transparent;
                position: absolute;
                left: -50px;         
                animation: cuadrito 5s infinite;
            }
            .cuadrito2{
                width: 50px;
                height: 50px;
                top: 75px;
                background-color: transparent;
                position: absolute;
                left: -50px;         
                animation: cuadrito2 6s infinite linear;
            }
            @keyframes cuadrito {
                0%{
                    left: -75px;
                    top: 50px;
                    rotate: 0deg;
                }50%{
                    top: 0px;
                    left: 175px;
                    rotate: -15deg;
                }100%{
                    left: 400px;
                    top: 75px;
                    rotate: -25deg;
                }
            }
            @keyframes cuadrito2 {
                0%{
                    left: -50px;
                    top: 75px;
                    rotate: 25deg;
                }50%{
                    left: 100px;
                    top: 50px;
                    rotate: -30deg;
                }75%{
                    left: 300px;
                    top: 150px;
                    rotate: 30deg;
                }100%{
                    left: 350px;
                    top: -50px;
                    rotate: -15deg;
                }
            }
            .cuadrito img{
                width: 50px;
                height: 50px;
            }
        </style>
    </head>
    <body>
        <div class="contenedor">
             <div class="cuadrito">
                <img src="./img/abeja.png" width="50px" height="50px">
            </div> 
            <div class="cuadrito2">
                <img src="/img/abeja2.png" width="50px" height="50px">
            </div> 
        </div>
    </body>
</html>
